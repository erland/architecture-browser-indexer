services:
  architecture-browser-indexer-worker:
    image: ghcr.io/erland/architecture-browser-indexer:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./workspace:/workspace
      - ./jobs:/jobs
      - ./lib:/app/lib
    environment:
      ARCH_BROWSER_TREE_SITTER_LIB_DIR: /app/lib/linux-aarch64
    ports:
      - "8080:8080"
    command:
      - --serve-http
      - --http-host
      - 0.0.0.0
      - --http-port
      - "8080"
      - --http-workspace-dir
      - /workspace/http-worker
